<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Layout</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="logout.css">
</head>
<body>

  <header class="mobile-header">
    <div class="mobile-logo">
      <i class="fa-solid fa-user-shield"></i>
      <span>AdminPanel</span>
    </div>
    <button class="menu-toggle" id="menuToggle">
      <i class="fa-solid fa-bars"></i>
    </button>
  </header>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <i class="fa-solid fa-user-shield"></i>
      </div>
      <div class="brand-info">
        <h3>ElitePlus</h3>
        <p>Management System</p>
      </div>
    </div>

    <nav class="sidebar-menu">
      <ul>
        <li class="menu-item">
          <a href="dashboard.html">
            <i class="fa-solid fa-chart-pie menu-icon"></i>
            <span class="menu-text">Dashboard</span>
          </a>
        </li>
        <li class="menu-item active">
          <a href="company-profile.html">
            <i class="fa-solid fa-building menu-icon"></i>
            <span class="menu-text">Company Profile</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="account-master.html">
            <i class="fa-solid fa-file-invoice-dollar menu-icon"></i>
            <span class="menu-text">Account Master</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="item-master.html">
            <i class="fa-solid fa-boxes-stacked menu-icon"></i>
            <span class="menu-text">Item Master</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="user-management.html">
            <i class="fa-solid fa-users-gear menu-icon"></i>
            <span class="menu-text">User Management</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="client-management.html">
            <i class="fa-solid fa-handshake menu-icon"></i>
            <span class="menu-text">Client Management</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="quotation.html">
            <i class="fa-solid fa-file-lines menu-icon"></i>
            <span class="menu-text">Quotation</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <a href="logout.html" class="logout-btn">
        <i class="fa-solid fa-right-from-bracket menu-icon"></i>
        <span class="menu-text">Logout</span>
      </a>
    </div>
  </aside>

 <main class="main-content">
  <div class="container-fluid px-0">
    <button class="btn-logout" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </div>
</main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bundle.min.js"></script>
  <script src="logout.js"></script>
</body>
</html>
